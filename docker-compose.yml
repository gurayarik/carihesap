version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carihesap-backend
    ports:
      - "5000:8000"   # Dış port 5000 yapıldı (http://IP:5000)
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
        - ./backend/cari.db:/app/cari.db
      # Do not use --reload in production containers (reload spawns subprocesses
      # which can cause import path issues inside containers). Use the simple
      # uvicorn command for production deployments.
      command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carihesap-frontend
    ports:
      build:
        context: ./frontend
        dockerfile: Dockerfile
      container_name: carihesap-frontend
      # Serve nginx default site on container port 80 mapped to host 4200
      ports:
        - "4200:80"
      networks:
        - carihesap-network
      depends_on:
        backend:
          condition: service_healthy