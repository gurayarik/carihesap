version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carihesap-backend
    ports:
      - "8001:8000"  # Dışarıdan erişim: http://IP:8001
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - carihesap-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carihesap-frontend
    ports:
      - "4201:4200"  # Dışarıdan erişim: http://IP:4201 (8080 yerine 4201 yaptık)
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ng serve --host 0.0.0.0 --port 4200 --disable-host-check
    networks:
      - carihesap-network
    depends_on:
      - backend

networks:
  carihesap-network:
    driver: bridge