version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carihesap-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
      # - ./backend/cari.db:/app/cari.db  # SİLİNDİ / YORUM SATIRI
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - carihesap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carihesap-frontend
    ports:
      - "8080:4200"  # ⚠️ 4200 yerine 8080 kullanıldı (çakışma önlemi)
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ng serve --host 0.0.0.0 --port 4200 --disable-host-check
    networks:
      - carihesap-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  carihesap-network:
    driver: bridge

volumes:
  db_data:
    driver: local