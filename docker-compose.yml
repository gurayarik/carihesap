version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carihesap-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      - ./backend:/app
      - ./backend/cari.db:/app/cari.db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - carihesap-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carihesap-frontend
    ports:
      - "4200:80"
    networks:
      - carihesap-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  carihesap-network:
    driver: bridge

volumes:
  db_data:
    driver: local