services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carihesap-backend
    ports:
      - "8001:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - carihesap-network
    # healthcheck tamamen kaldırıldı

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carihesap-frontend
    ports:
      - "8080:4200"
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ng serve --host 0.0.0.0 --port 4200 --disable-host-check
    networks:
      - carihesap-network
    depends_on:
      - backend  # condition kaldırıldı, sadece bağımlılık var