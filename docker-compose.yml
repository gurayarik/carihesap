version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: carihesap-backend
    ports:
      - "5000:8000"   # Dış port 5000 yapıldı (http://IP:5000)
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - carihesap-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: carihesap-frontend
    ports:
      - "3000:4200"   # Dış port 3000 yapıldı (http://IP:3000)
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npx ng serve --host 0.0.0.0 --port 4200 --disable-host-check
    networks:
      - carihesap-network
    depends_on:
      - backend

networks:
  carihesap-network:
    driver: bridge